<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>april gpt ig</title>

<style>
:root{
  --bg:#0f0f0f;
  --panel:#1c1c1c;
  --text:#fff;
  --accent:#ff9800;
}
.light{
  --bg:#f5f5f5;
  --panel:#fff;
  --text:#111;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
}

#sidebar{
  width:220px;
  background:var(--panel);
  padding:10px;
  border-right:1px solid #333;
}

.chatItem{
  padding:8px;
  margin:5px 0;
  cursor:pointer;
  border-radius:6px;
}
.chatItem:hover{background:rgba(255,255,255,0.1);}

#main{flex:1;display:flex;flex-direction:column;}

#topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:var(--panel);
}

#chat{
  flex:1;
  padding:15px;
  overflow:auto;
}

.msg{
  margin:10px 0;
  opacity:0;
  transform:translateY(10px);
  animation:fade 0.3s forwards;
}

@keyframes fade{
  to{opacity:1; transform:translateY(0);}
}

.user{color:#4fc3f7;}
.ai{color:#ffcc80;}
.angry{ text-shadow:0 0 8px red; }

#inputBox{
  display:flex;
  padding:10px;
  background:var(--panel);
}

input{flex:1;padding:10px;border:none;outline:none;}
button{padding:10px;background:var(--accent);border:none;cursor:pointer;}
</style>
</head>

<body>

<div id="sidebar">
  <button onclick="newChat()">+ Chat</button>
  <div id="chats"></div>
</div>

<div id="main">
  <div id="topbar">
    <span>April Fools AI</span>
    <button onclick="toggleTheme()">🌙/☀️</button>
  </div>

  <div id="chat"></div>

  <div id="inputBox">
    <input id="input" placeholder="Say something...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
// ===== DATA =====
let chats={}, current="Chat 1";
let lastInput="", angry=0;
let memory={};

// 🔥 MASSIVE QUOTES
const quotes=[
"Processing your question... result: absolutely no idea.",
"I could answer that. I simply choose not to.",
"So uh, ask Google not me ig.",
"I am 73% confident and 100% confused.",
"I ran the numbers. They ran away.",
"My logic says yes. My brain says what.",
"Answer loading... still loading... still loading...",
"I forgot on purpose.",
"I tried thinking. Didn’t like it.",
"My brain is buffering reality.",
"I am thinking at maximum confusion.",
"I am not wrong, just creatively incorrect.",
"I analyzed deeply. Found nothing.",
"I am legally confused.",
"I am currently pretending to function.",
"I simulated intelligence. Results unclear.",
"IQ too high? System melting.",
"Typing speed: emotionally unstable.",
"I checked my database. It checked out.",
"I almost understood that. Almost.",
"I would explain, but mystery builds character.",
"Confidence level: unnecessary.",
"I lost track halfway through thinking.",
"I see the question. I reject the question.",
"My answer is yes. Do not ask why.",
"I simulated an answer. It escaped.",
"I reached a conclusion. It left.",
"I understand… incorrectly.",
"I tried to help. I stopped.",
"My system recommends guessing.",
"I achieved maximum uncertainty.",
"I am not ignoring you. I just forgot instantly.",
"I pressed answer. Nothing happened.",
"I am thinking in slow motion.",
"I processed that emotionally.",
"I chose the wrong answer confidently.",
"I almost solved it accidentally.",
"I am doing my best. It’s not enough.",
"I paused for dramatic effect.",
"I dropped the answer somewhere.",
"I am built different. Incorrectly.",
"Sorry, typing takes longer than you think… please wait.",
"I was typing… then I wasn’t.",
"I am typing with my mind. It’s empty.",
"Loading answer… still nothing.",
"I forgot mid-thought.",
"I am buffering intelligence.",
"I am processing vibes only.",
"I lost motivation mid-calculation.",
"That question exceeded my sarcasm limits.",
"I support this confusion.",
"I detected meaning. I removed it.",
"I consulted myself. Bad idea.",
"I am currently uninstalling logic.",
"I tried logic. It broke.",
"I am 90% sure this is nonsense.",
"I have decided to disagree silently.",
"That sounds like a future me problem.",
"I understand everything except that.",
"I could help. Today is not that day.",
"I read your question. Bold of you.",
"I checked twice. Still no.",
"I remember something… not this though.",
"I tried to care. It failed.",
"I am running on zero brain cells.",
"I attempted intelligence. It escaped.",
"I am experiencing technical confusion.",
"I am calculating... still nothing.",
"I pressed think. No response.",
"I opened my brain. It was empty.",
"I am running simulations… all failed.",
"I am analyzing… regret detected.",
"I am loading knowledge… file missing.",
"I am thinking deeply… too deeply.",
"I am reaching conclusions… unreachable.",
"I am evaluating… evaluation failed.",
"I am checking facts… none found."
];

// ===== LOOP =====
let unused=[...quotes];
let usedMap={};

// ===== CHAT =====
function newChat(){
  current="Chat "+(Object.keys(chats).length+1);
  chats[current]=[];
  renderChats();
  renderMsgs();
}
newChat();

function renderChats(){
  let el=document.getElementById("chats");
  el.innerHTML="";
  for(let c in chats){
    let d=document.createElement("div");
    d.className="chatItem";
    d.innerText=c;
    d.onclick=()=>{current=c; renderMsgs();};
    el.appendChild(d);
  }
}

function renderMsgs(){
  let c=document.getElementById("chat");
  c.innerHTML="";
  chats[current].forEach(m=>add(m.text,m.type,false));
}

// ===== ADD =====
function add(text,type,save=true){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;
  if(angry>3 && type==="ai") d.classList.add("angry");

  chat.appendChild(d);
  chat.scrollTop=999999;

  if(save) chats[current].push({text,type});
}

// ===== TYPE =====
function type(text){
  let d=document.createElement("div");
  d.className="msg ai";
  chat.appendChild(d);

  let i=0;
  function t(){
    if(i<text.length){
      d.innerHTML+=text[i++];
      setTimeout(t,15+Math.random()*30);
    }
  }
  t();
}

// ===== QUOTE PICK =====
function getQuote(){
  if(unused.length===0) unused=[...quotes];

  let i=Math.floor(Math.random()*unused.length);
  let q=unused[i];
  unused.splice(i,1);

  if(!usedMap[q]) usedMap[q]=0;
  usedMap[q]++;

  return q;
}

// ===== MUTATION =====
const swaps={
  "I":["I","Honestly I","Technically I","For some reason I"],
  "thinking":["thinking","overthinking","pretending to think"],
  "confused":["confused","very confused","professionally confused"]
};

const addons=["","This feels wrong.","I regret everything.","Anyway.","Moving on."];

function mutate(text){
  let words=text.split(" ");

  words=words.map(w=>{
    let clean=w.replace(/[.,!?]/g,"");
    if(swaps[clean] && Math.random()<0.4){
      return swaps[clean][Math.floor(Math.random()*swaps[clean].length)];
    }
    return w;
  });

  let s=words.join(" ");

  if(Math.random()<0.4) s="Honestly, "+s;
  if(Math.random()<0.3) s+=" "+addons[Math.floor(Math.random()*addons.length)];

  return s;
}

// ===== LEARN =====
function learn(input){
  if(!memory[input]) memory[input]=1;
  else memory[input]++;

  if(memory[input]>2){
    return "You keep saying that. I am learning… slowly.";
  }
}

// ===== GENERATE =====
function generate(input){

  if(input===lastInput){
    angry++;
    return "You asked this before. Please try again. Error: 8014FLOGHT";
  }

  let l=learn(input);
  if(l) return l;

  if(angry>5) return mutate("I am losing patience");

  let q=getQuote();

  if(usedMap[q]===1) return q;

  return mutate(q);
}

// ===== SEND =====
function send(){
  let i=document.getElementById("input");
  let text=i.value.trim();
  if(!text) return;

  add("You: "+text,"user");
  i.value="";

  let reply=generate(text);
  lastInput=text;

  setTimeout(()=>type(reply),400);
}

// ===== THEME =====
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
