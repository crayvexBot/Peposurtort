<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>April Fools AI - Login System</title>

<style>
:root{
  --bg:#0f0f0f;
  --panel:#1c1c1c;
  --text:#fff;
  --accent:#ff9800;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* LOGIN */
#login{
  width:320px;
  background:var(--panel);
  padding:20px;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input{
  padding:10px;
  border:none;
  border-radius:6px;
  outline:none;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:var(--accent);
  cursor:pointer;
}

button:active{
  transform:scale(0.95);
}

/* APP */
#app{
  width:100%;
  height:100vh;
  display:none;
  flex-direction:row;
}

/* SIDEBAR */
#sidebar{
  width:220px;
  background:var(--panel);
  padding:10px;
  overflow:auto;
}

/* CHAT */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
}

#chat{
  flex:1;
  padding:10px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{
  max-width:80%;
  padding:10px;
  border-radius:10px;
}

.user{align-self:flex-start;background:#2b8cff;}
.ai{align-self:flex-end;background:#2a2a2a;color:#ffcc80;}

#inputBar{
  display:flex;
  padding:10px;
  background:var(--panel);
  gap:8px;
}

</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login">
  <h3>April Fools AI Login</h3>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>
  <button onclick="signin()">Sign In</button>

  <small id="msg"></small>
</div>

<!-- APP -->
<div id="app">

  <div id="sidebar">
    <b>Chats</b>
    <div id="chats"></div>
  </div>

  <div id="main">

    <div id="chat"></div>

    <div id="inputBar">
      <input id="input" placeholder="Type...">
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script>

/* ================= LOGIN SYSTEM ================= */

function signup(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(!u||!p) return;

  localStorage.setItem("user_"+u,p);

  document.getElementById("msg").innerText="Account created!";
}

function signin(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  let saved=localStorage.getItem("user_"+u);

  if(saved && saved===p){
    localStorage.setItem("session",u);
    startApp();
  }else{
    document.getElementById("msg").innerText="Wrong login!";
  }
}

function startApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";
  initChat();
}

/* auto login */
if(localStorage.getItem("session")){
  startApp();
}

/* ================= CHAT ================= */

let chats={}, current="chat1";

function initChat(){
  chats[current]=[];
  renderChats();
}

function renderChats(){
  let c=document.getElementById("chats");
  c.innerHTML="Main Chat";
}

function add(text,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;
  chat.appendChild(d);
  chat.scrollTop=999999;
}

/* ================= AI ================= */

const quotes=[
"I am thinking… incorrectly.",
"I am AI… probably.",
"I forgot everything.",
"I am running on confusion.",
"I am malfunctioning politely.",
"I am 404 brain not found.",
"I am system overload.",
"I am chaos engine."
];

function getAI(input){
  return quotes[Math.floor(Math.random()*quotes.length)];
}

/* ================= SEND ================= */

function send(){
  let i=document.getElementById("input");
  let text=i.value.trim();
  if(!text) return;

  add("You: "+text,"user");
  i.value="";

  setTimeout(()=>{
    add(getAI(text),"ai");
  },400);
}

</script>

</body>
</html>
