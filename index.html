<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>April Fools AI V12</title>

<style>
:root{
  --bg:#0f0f0f;
  --panel:#1c1c1c;
  --text:#fff;
  --accent:#ff9800;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* APP */
#app{
  width:70vw;
  height:80vh;
  display:flex;
  flex-direction:row;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

/* SIDEBAR */
#sidebar{
  width:220px;
  background:var(--panel);
  padding:10px;
  overflow:auto;
}

#main{
  flex:1;
  display:flex;
  flex-direction:column;
}

#chat{
  flex:1;
  padding:10px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* MESSAGES */
.msg{
  max-width:80%;
  padding:10px;
  border-radius:10px;
}

.user{align-self:flex-start;background:#2b8cff;}
.ai{align-self:flex-end;background:#2a2a2a;color:#ffcc80;}

/* INPUT */
#inputBar{
  display:flex;
  padding:10px;
  background:var(--panel);
  gap:8px;
}

#input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
  outline:none;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:var(--accent);
  cursor:pointer;
}
</style>
</head>

<body>

<div id="app">

  <div id="sidebar">
    <b>AI Chats</b>
    <div>Main Chat</div>
  </div>

  <div id="main">

    <div id="chat"></div>

    <div id="inputBar">
      <input id="input" placeholder="Type...">
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script>

/* ================= NORMALIZER ================= */
function normalize(text){
  return text
    .toLowerCase()
    .trim()
    .replace(/(.)\1{2,}/g,"$1$1")
    .replace(/[^a-z0-9\s?!.]/gi,"");
}

/* ================= INTENT DETECTOR ================= */
function detectIntent(t){

  if(!t) return "empty";

  if(/^(hi+|hello+|hey+|yo+|sup+)/.test(t)) return "greet";

  if(t.includes("help") || t.includes("how") || t.includes("stuck")) return "help";

  if(t.includes("?") || t.startsWith("what") || t.startsWith("why") || t.startsWith("how")) return "question";

  if(t.includes("nobody asked") || t.includes("who asked") || t.includes("no one asked")) return "ignored";

  if(t.includes("bro") || t.includes("wtf") || t.includes("lol")) return "emotion";

  if(t.length < 3) return "short";

  return "normal";
}

/* ================= AI ENGINE ================= */
function getAI(input){

  let t = normalize(input);
  let intent = detectIntent(t);

  switch(intent){

    case "greet":
      return "Hi.... what's wrong";

    case "help":
      return "I will try to assist… success not guaranteed.";

    case "question":
      return "I detected a question. Processing failed successfully.";

    case "ignored":
      return "oh nooo.. Nobody asked :(";

    case "emotion":
      if(t.includes("bro")) return "You seem emotionally loud. I am observing.";
      if(t.includes("wtf")) return "Confusion detected. Stability: low.";
      if(t.includes("lol")) return "You are laughing. I will simulate understanding.";
      return "Emotion detected. Processing human instability.";

    case "short":
      return "That input is extremely minimal.";

    case "empty":
      return "You typed nothing. That is still input, technically.";

  }

  let responses = [
    "I understood your message, but I misinterpreted it.",
    "Your input is valid, my response is not.",
    "I am analyzing your sentence... result unclear.",
    "This message has been logged as questionable data.",
    "I attempted logic, then stopped.",
    "I am simulating intelligence poorly.",
    "Your message exists. My understanding does not."
  ];

  return responses[Math.floor(Math.random()*responses.length)];
}

/* ================= CHAT ================= */
function add(text,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;
  chat.appendChild(d);
  chat.scrollTop=999999;
}

/* ================= SEND ================= */
function send(){
  let i=document.getElementById("input");
  let text=i.value.trim();
  if(!text) return;

  add("You: "+text,"user");

  i.value="";

  setTimeout(()=>{
    add(getAI(text),"ai");
  },400);
}

</script>

</body>
</html>
