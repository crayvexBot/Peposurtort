<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>April Fools AI V10</title>

<style>
:root{
  --bg:#0f0f0f;
  --panel:#1c1c1c;
  --text:#fff;
  --accent:#ff9800;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:var(--text);
}

/* LOGIN */
#login{
  width:320px;
  background:var(--panel);
  padding:20px;
  border-radius:12px;
  display:none;
  flex-direction:column;
  gap:10px;
}

input{
  padding:10px;
  border:none;
  border-radius:6px;
  outline:none;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:var(--accent);
  cursor:pointer;
}

/* APP WINDOW */
#app{
  width:70vw;
  height:80vh;
  display:none;
  background:var(--bg);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
  flex-direction:row;
}

/* SIDEBAR */
#sidebar{
  width:220px;
  background:var(--panel);
  padding:10px;
  overflow:auto;
  transition:0.3s;
}

#sidebar.min{
  width:60px;
}

/* CHAT AREA */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
}

#chat{
  flex:1;
  padding:10px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* MESSAGES */
.msg{
  max-width:80%;
  padding:10px;
  border-radius:10px;
  word-wrap:break-word;
}

.user{align-self:flex-start;background:#2b8cff;}
.ai{align-self:flex-end;background:#2a2a2a;color:#ffcc80;}

/* INPUT */
#inputBar{
  display:flex;
  padding:10px;
  background:var(--panel);
  gap:8px;
}

#input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
  outline:none;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h3>Login</h3>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="signin()">Sign In</button>
</div>

<!-- APP -->
<div id="app">

  <div id="sidebar">
    <button onclick="newChat()">+ Chat</button>
    <div id="chats"></div>
  </div>

  <div id="main">

    <div id="chat"></div>

    <div id="inputBar">
      <input id="input" placeholder="Type...">
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script>

/* ================= SAFE START FIX ================= */

window.onload = () => {
  let session = localStorage.getItem("session");

  if(session && session !== "undefined" && session !== "null"){
    start();
  } else {
    document.getElementById("login").style.display="flex";
    document.getElementById("app").style.display="none";
  }
};

/* ================= LOGIN ================= */

function signup(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(!u||!p) return;

  localStorage.setItem("user_"+u, JSON.stringify({p}));
  alert("Account created!");
}

function signin(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  let data=localStorage.getItem("user_"+u);

  if(!data){
    alert("User not found");
    return;
  }

  let obj=JSON.parse(data);

  if(obj.p===p){
    localStorage.setItem("session",u);
    start();
  } else {
    alert("Wrong password");
  }
}

/* ================= APP START ================= */

function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";
  init();
}

/* ================= STATE ================= */

let chats={}, current="chat1";
let lastInput="";
let memory={};
let mood=0;

/* ================= INIT ================= */

function init(){
  chats[current]={
    name:null,
    messages:[]
  };

  renderChats();
}

/* ================= CHAT NAME ================= */

function genName(t){
  t=t.toLowerCase();

  if(t.includes("hi")||t.includes("hello")) return "Greeting Chat";
  if(t.includes("help")) return "Help Chat";

  return t.slice(0,12);
}

/* ================= DETECTION ================= */

function detect(text){
  let t=text.toLowerCase();
  let clean=t.replace(/[^a-z0-9\s]/gi,"");

  const greet=["hi","hello","hey","yo"];
  const help=["help","how","can you","what"];

  const ignored=["nobody asked","no one asked","who asked"];

  if(greet.some(x=>clean.includes(x))) return "greet";
  if(help.some(x=>clean.includes(x))) return "help";

  if(t.includes("?")) return "question";

  if(ignored.some(x=>clean.includes(x))) return "ignored";

  if(clean.length<4) return "short";

  return "normal";
}

/* ================= AI QUOTES ================= */

let quotes=[
"I am thinking incorrectly.",
"I am AI probably.",
"I am 73% confused.",
"I forgot on purpose.",
"I am chaos engine.",
"I attempted logic and failed.",
"I am malfunctioning politely.",
"I am system overload.",
"I am running on nothing.",
"I am unstable but active.",
"I am conceptually broken.",
"I am thinking too hard.",
"I am buffering existence."
];

/* ================= AI ================= */

function getAI(input){

  let type=detect(input);

  if(type==="greet") return "Hi.... what's wrong";
  if(type==="help") return "I’ll try… maybe.";
  if(type==="question") return "That is a dangerous question.";
  if(type==="ignored") return "oh nooo.. Nobody asked :(";
  if(type==="short") return "That was very minimal.";

  return quotes[Math.floor(Math.random()*quotes.length)];
}

/* ================= SEND ================= */

function send(){
  let i=document.getElementById("input");
  let text=i.value.trim();
  if(!text) return;

  add("You: "+text,"user");

  if(!chats[current].name){
    chats[current].name=genName(text);
  }

  i.value="";
  lastInput=text;

  setTimeout(()=>{
    add(getAI(text),"ai");
    renderChats();
  },400);
}

/* ================= UI ================= */

function add(text,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;

  chat.appendChild(d);
  chat.scrollTop=999999;

  chats[current].messages.push({text,type});
}

function renderChats(){
  let c=document.getElementById("chats");
  c.innerHTML="";

  for(let x in chats){
    let d=document.createElement("div");
    d.innerText=chats[x].name||x;
    d.onclick=()=>{current=x;renderMsgs();};
    c.appendChild(d);
  }
}

function renderMsgs(){
  chat.innerHTML="";
  chats[current].messages.forEach(m=>{
    let d=document.createElement("div");
    d.className="msg "+m.type;
    d.innerText=m.text;
    chat.appendChild(d);
  });
}

</script>

</body>
</html>
