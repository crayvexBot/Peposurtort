<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>april gpt</title>

<style>
:root{
  --bg:#0f0f0f;
  --panel:#1c1c1c;
  --text:#fff;
  --accent:#ff9800;
}

.light{
  --bg:#f4f4f4;
  --panel:#ffffff;
  --text:#111;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#app{
  width:420px;
  height:600px;
  display:flex;
  flex-direction:column;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

#top{
  background:var(--panel);
  padding:10px;
  display:flex;
  justify-content:space-between;
}

#chat{
  flex:1;
  padding:10px;
  overflow:auto;
}

.msg{
  margin:8px 0;
  opacity:0;
  transform:translateY(10px);
  animation:fade 0.25s forwards;
}

@keyframes fade{
  to{opacity:1; transform:translateY(0);}
}

.user{color:#4fc3f7;}
.ai{color:#ffcc80;}

.angry{ text-shadow:0 0 8px red; }

#inputBar{
  display:flex;
  background:var(--panel);
  padding:10px;
  gap:8px;
}

input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  border-radius:6px;
}

/* SEND BUTTON ANIMATION */
button{
  padding:12px 16px;
  border:none;
  background:var(--accent);
  cursor:pointer;
  border-radius:6px;
  transition:0.2s;
}

button:active{
  transform:scale(0.9);
  background:#ffb347;
}
</style>
</head>

<body>

<div id="app">
  <div id="top">
    <span>April Fools AI</span>
    <button onclick="toggleTheme()">🌙</button>
  </div>

  <div id="chat"></div>

  <div id="inputBar">
    <input id="input" placeholder="Type something...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

// ===== SYSTEM =====
function add(text,cls){
  let d=document.createElement("div");
  d.className="msg "+cls;
  d.innerText=text;

  if(angry>3 && cls==="ai") d.classList.add("angry");

  chat.appendChild(d);
  chat.scrollTop=999999;
}

// ===== LEARN =====
function learn(input){
  if(!memory[input]) memory[input]=1;
  else memory[input]++;

  if(memory[input]>2){
    return "You keep repeating that. I am learning… slowly… painfully.";
  }
}

// ===== GENERATE =====
function generate(input){

  if(input===lastInput){
    angry++;
    return "You asked this before. Please try again. Error: 8014FLOGHT";
  }

  let l=learn(input);
  if(l) return l;

  return quotes[Math.floor(Math.random()*quotes.length)];
}

let lastInput="";

// ===== SEND =====
function send(){
  let i=document.getElementById("input");
  let text=i.value.trim();
  if(!text) return;

  add("You: "+text,"user");
  i.value="";

  let reply=generate(text);
  lastInput=text;

  setTimeout(()=>{
    add(reply,"ai");
  },400);
}

// ===== THEME =====
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>
