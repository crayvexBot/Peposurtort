<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>April Fools AI</title>

<style>
:root{
  --bg:#0f0f0f;
  --panel:#1c1c1c;
  --text:#fff;
  --accent:#ff9800;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
}

/* SIDEBAR */
#sidebar{
  width:220px;
  background:var(--panel);
  border-right:1px solid #333;
  padding:10px;
  overflow:auto;
  transition:0.3s;
}

.hidden{
  width:0 !important;
  padding:0 !important;
  overflow:hidden !important;
}

/* MAIN */
#app{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOP */
#top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:var(--panel);
}

/* CHAT */
#chat{
  flex:1;
  padding:10px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{
  max-width:80%;
  padding:10px;
  border-radius:10px;
  animation:fade 0.2s ease;
  word-wrap:break-word;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.user{
  align-self:flex-start;
  background:#2b8cff;
}

.ai{
  align-self:flex-end;
  background:#2a2a2a;
  color:#ffcc80;
}

/* INPUT */
#inputBar{
  display:flex;
  padding:10px;
  background:var(--panel);
  gap:8px;
}

input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  border-radius:6px;
}

button{
  padding:12px;
  border:none;
  background:var(--accent);
  border-radius:6px;
  cursor:pointer;
}

button:active{
  transform:scale(0.9);
}

/* GLITCH */
.glitch{
  animation:glitch 0.2s infinite;
}

@keyframes glitch{
  0%{transform:translate(0);}
  25%{transform:translate(-2px,2px);}
  50%{transform:translate(2px,-2px);}
  75%{transform:translate(-1px,1px);}
  100%{transform:translate(0);}
}
</style>
</head>

<body>

<div id="sidebar">
  <button onclick="newChat()">+ Chat</button>
  <div id="chats"></div>
</div>

<div id="app">

  <div id="top">
    <button onclick="toggleSidebar()">☰</button>
    <span>April Fools AI v9.1 FULL</span>
    <button onclick="toggleTheme()">🌙</button>
  </div>

  <div id="chat"></div>

  <div id="inputBar">
    <input id="input" placeholder="Type...">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

/* ===== SOUND ===== */
function beep(type){
  let ctx=new (window.AudioContext||window.webkitAudioContext)();
  let o=ctx.createOscillator();
  let g=ctx.createGain();

  o.connect(g);
  g.connect(ctx.destination);

  o.frequency.value =
    type==="send"?520:
    type==="ai"?320:140;

  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.2);
  o.stop(ctx.currentTime+0.2);
}

let lastInput="";

let mood=0;

/* ===== CHAT SYSTEM ===== */
function newChat(){
  current="Chat "+(Object.keys(chats).length+1);
  chats[current]=[];
  renderChats();
  renderMsgs();
}

newChat();

function renderChats(){
  let c=document.getElementById("chats");
  c.innerHTML="";
  for(let x in chats){
    let d=document.createElement("div");
    d.innerText=x;
    d.style.padding="6px";
    d.onclick=()=>{current=x; renderMsgs();};
    c.appendChild(d);
  }
}

function renderMsgs(){
  chat.innerHTML="";
  chats[current].forEach(m=>add(m.text,m.type,false));
}

/* ===== ADD MSG ===== */
function add(text,type,save=true){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;
  chat.appendChild(d);
  chat.scrollTop=999999;

  if(save){
    chats[current].push({text,type});
  }
}

/* ===== LEARN + MOOD ===== */
function learn(input){
  if(!memory[input]) memory[input]=1;
  else memory[input]++;

  if(memory[input]>2){
    mood++;
    return "You keep repeating that. I am learning… slowly.";
  }
}

/* ===== AI ENGINE ===== */
function getAI(input){

  input=input.toLowerCase();

  if(input===lastInput){
    mood++;
    beep("error");
    return "You asked this before. Please try again. Error: 8014FLOGHT";
  }

  let l=learn(input);
  if(l) return l;

  if(mood>6){
    document.getElementById("app").classList.add("glitch");
  }

  return quotes[Math.floor(Math.random()*quotes.length)];
}

/* ===== SEND ===== */
function send(){
  let i=document.getElementById("input");
  let text=i.value.trim();
  if(!text) return;

  beep("send");
  add("You: "+text,"user");
  i.value="";

  lastInput=text;

  setTimeout(()=>{
    beep("ai");
    add(getAI(text),"ai");
  },400);
}

/* ===== TOGGLES ===== */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("hidden");
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

</script>
